name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 22+: supabase-js's realtime client needs native WebSocket if it is
          # ever constructed under Node (the auth client is lazy, so tests
          # don't — this is belt-and-braces, run 29703622528 was the lesson).
          node-version: 22
          cache: npm
      - run: npm ci
      # The calibration set gates the deploy: if the generator drifts away from
      # the levels in Ivy's real workbook, the build fails and nothing ships.
      # (Finn's C1 spec: "CI fails if the generator drifts.")
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
